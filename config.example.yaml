exchange: kalshi              # kalshi (predictit, ibkr planned for future)

mode: demo

credentials:
  # Nested format (for multi-exchange, future):
  # kalshi:
  #   demo:
  #     api_key_id: "your-demo-key-id"
  #     private_key_path: "~/.kalshi/demo_private_key.pem"
  #   live:
  #     api_key_id: "your-live-key-id"
  #     private_key_path: "~/.kalshi/live_private_key.pem"

  # Flat format (current, backward compatible):
  demo:
    api_key_id: "your-demo-key-id"
    private_key_path: "~/.kalshi/demo_private_key.pem"
  live:
    api_key_id: "your-live-key-id"
    private_key_path: "~/.kalshi/live_private_key.pem"

strategy:
  risk_mode: conservative    # conservative | moderate | aggressive
  fill_timeout_secs: 30
  event_poll_interval_secs: 60
  max_session_loss: 1.0              # Stop trading if cumulative loss exceeds this ($)
  circuit_breaker_on_any_loss: true   # Stop on ANY loss (default: true) — any loss means a bug
  maker_enabled: true                 # Post maker orders on near-arb events (0% fees)
  maker_fill_mode: cancel_and_take    # cancel_and_take | tighten_on_fill
  max_maker_events: 3                 # Max events with resting maker orders
  maker_max_horizon_hours: 4          # Only post maker orders on events closing within this window
  maker_order_ttl_secs: 300             # How long maker/two-sided resting orders live before exchange auto-cancels (seconds)
  # maker_min_volume_24h: 10.0        # Volume floor for maker (lower than taker; conservative=10, moderate/aggressive=0)
  max_contracts_per_arb: 1            # Max contracts per arb execution (default: 1)
  sequential_execution: true          # Execute legs one at a time, highest price first (default: true)
  # Optional overrides (uncomment to customize):
  # min_volume_24h: 50
  # min_bid_depth: 5
  # min_ask_depth: 5                  # Ask-side depth check (conservative=5, moderate=2, aggressive=1)
  # min_profit_pct: 2.0
  # require_recent_trades: true
  # max_exposure_ratio: 2.0
  # unwind_phase1_secs: 15
  # unwind_phase2_secs: 30
  # unwind_price_step_cents: 3
  # min_open_interest: 0
  # min_liquidity: 0

  # Buy-side structural arb — DISABLED (structural ask-lifting risk, two live losses from partial fills)
  # enable_buy_side_arb: false
  # min_buy_side_coverage: 0.90  # reject events where ask_sum < this (applied after hard guards ask_sum<0.60/max_ask<0.20); conservative=0.90, moderate=0.88, aggressive=0.85

  # Near-expiry stale order harvesting (relaxed taker within window of close)
  # near_expiry_window_minutes: 30     # 0 = disabled; conservative=30, moderate=60, aggressive=120
  # near_expiry_min_profit_pct: 1.0
  # near_expiry_min_bid_depth: 1
  # near_expiry_min_volume_24h: 0.0

  # Two-sided market making — DISABLED (untested in live, re-enable once execution layer is proven)
  # two_sided_max_inventory: 0         # 0 = disabled
  # two_sided_min_spread_cents: 6      # conservative=6, moderate=4, aggressive=2
  # two_sided_timeout_secs: 120        # cancel unfilled pair after this many seconds
  # two_sided_min_volume_24h: 50.0

logging:
  level: INFO
  file: logs/arb_bot.log
  max_file_size_mb: 5                # Rotate log file at this size (MB)
  max_backup_count: 5                # Keep this many rotated log files (total max: 25 MB)

recording:
  enabled: true                      # Record orderbook snapshots, signals, fills (default: true)
  db_path: data/arb_history.duckdb   # DuckDB database file (default: data/arb_history.duckdb)
  session_dir: data/sessions         # Legacy per-session directory (fallback if db_path absent)
  snapshot_interval_secs: 5          # How often to snapshot each event's orderbooks (default: 5)
  balance_poll_interval_secs: 300    # How often to poll and record balance (default: 300)
  retention_max_db_size_mb: 5000     # Prune oldest sessions when DB exceeds this (MB)
  cleanup_interval_secs: 1800        # How often to run cleanup during runtime (seconds)
  write_buffer_size: 50              # Batch orderbook snapshots before flushing (default: 50)

# PredictIt-specific (only used when exchange: predictit)
# Requires DECODO_PROXY_URL in .env file
# predictit:
#   poll_interval_secs: 60           # Match PredictIt's data refresh cadence
#   session_dir: ~/.kalshi/predictit_session  # Playwright session state directory
#   headless: true                   # false for manual login, true for production
#   include_withdrawal_fee: true     # Include 5% withdrawal fee in profit calculations
#   min_profit_pct: 5.0             # Higher than Kalshi due to 60s data staleness
#   execution_timeout_secs: 30      # Browser actions are slower than REST
#
# NOTE: PredictIt's JSON endpoint provides only best bid/ask (no depth data).
# Synthetic orderbooks have depth=1 at each level. You MUST override depth
# filters or use aggressive risk mode, otherwise all signals get rejected:
#   min_bid_depth: 1
#   min_ask_depth: 1
# Capital budget per exchange (omit or set to 0 for unlimited)
# Bot will not deploy more than this amount on a given exchange.
# Resting orders (maker, two-sided) count toward the budget.
# capital_budget:
#   kalshi: 25.00
#   predictit: 50.00
